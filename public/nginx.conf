# Это пример конфигурационного файла Nginx для React SPA.
# Скопируйте блок location / в конфигурацию вашего сервера (обычно в /etc/nginx/sites-available/)
# Важно: Замените '/path/to/your/dist' на реальный путь к файлам сайта на сервере.

server {
    listen 80;
    server_name pgatk.by www.pgatk.by;

    # Корневая папка сайта (куда вы скопировали содержимое папки dist)
    root /path/to/your/dist;
    index index.html index.htm;

    # Главное правило для React Router (обработка ссылок вроде /news):
    # Если файл или папка не найдены, сервер должен вернуть index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Опционально: Настройка кэширования для статических файлов (ускоряет работу сайта)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires max;
        log_not_found off;
    }
}
